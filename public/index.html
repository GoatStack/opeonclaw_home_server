<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서버 상태</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #f8fafc 0%, #e2e8f0 100%);
      color: #0f172a;
    }
    .panel {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      padding: 32px 40px;
      max-width: 440px;
      width: calc(100% - 32px);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
      font-weight: 600;
    }
    .muted { color: #64748b; font-size: 0.9rem; margin: 0 0 20px; }
    dl { margin: 0; display: grid; gap: 12px; }
    dt { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: #94a3b8; }
    dd { margin: 4px 0 0; font-size: 1rem; font-variant-numeric: tabular-nums; word-break: break-all; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      background: #ecfdf5;
      color: #047857;
      font-size: 0.875rem;
      font-weight: 500;
    }
    .badge.warn {
      background: #fffbeb;
      color: #b45309;
    }
    .badge.warn::before { background: #f59e0b; }
    .badge.bad {
      background: #fef2f2;
      color: #b91c1c;
    }
    .badge.bad::before { background: #ef4444; }
    .badge::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
    }
    .err { color: #b91c1c; font-size: 0.85rem; margin-top: 12px; line-height: 1.45; }
    .hint { color: #64748b; font-size: 0.8rem; margin-top: 8px; line-height: 1.45; }
    hr { border: none; border-top: 1px solid #e2e8f0; margin: 20px 0; }
    .sub { font-size: 0.8rem; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="panel">
    <h1>원격 서버</h1>
    <p class="muted">yeongseo.kr:8006 (Proxmox) — 로컬 백엔드가 중계합니다.</p>
    <p id="status" class="muted">불러오는 중…</p>
    <dl id="details">
      <div><dt>대상</dt><dd id="remote">—</dd></div>
      <div><dt>HTTP</dt><dd id="http">—</dd></div>
      <div id="pve-block" hidden>
        <dt>Proxmox</dt>
        <dd id="pve">—</dd>
      </div>
      <div><dt>로컬 시각 (UTC)</dt><dd id="localTime">—</dd></div>
    </dl>
    <p id="hint" class="hint" hidden></p>
    <p id="error" class="err" hidden></p>
    <hr />
    <p class="sub">HTML을 파일로만 열면 API가 없어 404가 납니다. 반드시 <code>npm start</code> 후 브라우저에서 열어 주세요.</p>
  </div>
  <script>
    async function load() {
      const errEl = document.getElementById('error');
      const hintEl = document.getElementById('hint');
      const pveBlock = document.getElementById('pve-block');
      try {
        const res = await fetch('/api/server-info');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        errEl.hidden = true;
        hintEl.hidden = true;

        document.getElementById('remote').textContent = data.remote || '—';
        document.getElementById('http').textContent =
          data.httpStatus != null ? String(data.httpStatus) : '—';
        document.getElementById('localTime').textContent =
          data.local && data.local.time ? data.local.time : '—';

        const st = document.getElementById('status');
        if (!data.reachable || data.ok === false) {
          st.innerHTML = '<span class="badge bad">연결 실패</span>';
          errEl.textContent = data.error || '원격에 연결할 수 없습니다.';
          errEl.hidden = false;
          pveBlock.hidden = true;
          return;
        }

        if (data.pve) {
          const v = data.pve;
          const line = [v.version, v.release].filter(Boolean).join(' · ');
          document.getElementById('pve').textContent = line || JSON.stringify(v);
          pveBlock.hidden = false;
        } else {
          pveBlock.hidden = true;
        }

        if (data.authRequired) {
          st.innerHTML = '<span class="badge warn">도달함 · 인증 필요</span>';
          hintEl.textContent = data.hint || '';
          hintEl.hidden = !data.hint;
        } else if (data.pve) {
          st.innerHTML = '<span class="badge">연결됨</span>';
        } else {
          st.innerHTML = '<span class="badge warn">응답 확인</span>';
          hintEl.textContent = (data.bodyPreview || '').trim() || '예상과 다른 응답입니다.';
          hintEl.hidden = false;
        }
      } catch (e) {
        document.getElementById('status').innerHTML = '<span class="badge bad">로컬 API 없음</span>';
        errEl.textContent =
          (e && e.message) ||
          '이 페이지는 같은 주소의 Node 서버와 함께 열어야 합니다. npm start 후 http://localhost:포트/ 로 접속하세요.';
        errEl.hidden = false;
        hintEl.hidden = true;
        pveBlock.hidden = true;
      }
    }

    load();
    setInterval(load, 10000);
  </script>
</body>
</html>
